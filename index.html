<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense">
<title>Daily Expense</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --surface:#1e293b;--surface2:#263348;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--success:#34d399;--danger:#f87171;--warning:#fbbf24;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.header{padding:calc(var(--safe-top)+12px) 20px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:6px}
.header-left p{font-size:11px;color:var(--text3);margin-top:2px}
.sync-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.sync-btn.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.dot.warn{background:var(--warning)}.dot.err{background:var(--danger)}

.content{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom)+68px)}
.page{display:none;padding:16px}.page.active{display:block}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 7px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;gap:3px;border:none;background:none;font-family:'DM Sans',sans-serif}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.on{color:var(--accent)}.nav-btn.on svg{stroke:var(--accent)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--surface2);border-radius:var(--r);padding:14px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.metric-val{font-size:18px;font-weight:600;letter-spacing:-.02em}
.metric-sub{font-size:11px;margin-top:3px;color:var(--text3)}
.metric-sub.up{color:var(--danger)}.metric-sub.dn{color:var(--success)}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-name{width:88px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--bg3);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.bar-val{font-size:10px;font-weight:600;color:rgba(255,255,255,.9)}

/* Expense item */
.exp{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.exp:last-child{border-bottom:none}
.exp-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.exp-right{text-align:right;flex-shrink:0}
.exp-amt{font-size:14px;font-weight:600}
.exp-date{font-size:11px;color:var(--text3);margin-top:2px}
.badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}

/* Form */
.fg{margin-bottom:13px}
.fl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
select.fi option{background:var(--bg2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif}
.tag.on{color:#fff}

/* Buttons */
.btn{padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-primary{background:var(--accent);color:#0f172a;width:100%;justify-content:center}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-del{background:transparent;border:1px solid var(--border);color:var(--danger);padding:5px 10px;font-size:12px;border-radius:var(--r-sm);cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r-sm)}

/* Filters */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0}
.chip.on{background:rgba(56,189,248,.12);border-color:var(--accent);color:var(--accent)}
.list-info{font-size:12px;color:var(--text3);text-align:right;margin-bottom:8px}

/* Settings rows */
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.sname{font-size:13px;display:flex;align-items:center;gap:7px}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.add-row{display:flex;gap:7px;margin-bottom:11px;align-items:center}
.cpick{width:38px;height:38px;border-radius:var(--r-sm);border:1px solid var(--border2);background:none;padding:3px;cursor:pointer;flex-shrink:0}
.slabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:18px 0 9px}
.slabel:first-child{margin-top:0}

/* Log */
.log-item{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.log-action{font-size:12px;font-weight:600;margin-bottom:2px}
.log-detail{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-time{font-size:11px;color:var(--text3);margin-top:2px}

/* Toast */
#toast{position:fixed;bottom:calc(var(--safe-bottom)+78px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Loading */
#loader{position:fixed;inset:0;background:rgba(15,23,42,.88);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loader.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
#loader span{font-size:13px;color:var(--text2)}

/* Empty */
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px;opacity:.4}

/* Offline */
#offline{background:rgba(251,191,36,.12);border-bottom:1px solid rgba(251,191,36,.3);padding:7px 16px;text-align:center;font-size:12px;color:var(--warning);display:none}
#offline.show{display:block}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><span id="loader-msg">Memuat data...</span></div>
<div id="offline">⚠️ Offline — data tidak bisa dimuat real-time</div>
<div id="toast"></div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <h1>Daily Expense <span class="dot" id="dot"></span></h1>
      <p id="status">Menghubungkan...</p>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="loadAll()">⟳</button>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div id="pg-dashboard" class="page active">
      <div class="metrics" id="metrics"></div>
      <div class="card">
        <div class="card-title">📊 Per Kategori — bulan ini</div>
        <div id="chart-cat"><div class="empty"><div class="empty-icon">📊</div>Memuat...</div></div>
      </div>
      <div class="card">
        <div class="card-title">👤 Per PIC — bulan ini</div>
        <div id="chart-pic"><div class="empty"><div class="empty-icon">👤</div>Memuat...</div></div>
      </div>
      <div class="card">
        <div class="card-title">🕐 Terbaru</div>
        <div id="recent"><div class="empty"><div class="empty-icon">📭</div>Memuat...</div></div>
      </div>
    </div>

    <!-- TAMBAH -->
    <div id="pg-add" class="page">
      <div class="card">
        <div class="slabel">Tambah Pengeluaran</div>
        <div class="row2">
          <div class="fg"><label class="fl">Tanggal</label><input type="date" id="f-date" class="fi"></div>
          <div class="fg"><label class="fl">Jumlah (Rp)</label><input type="number" id="f-amount" class="fi" placeholder="0" inputmode="numeric"></div>
        </div>
        <div class="fg"><label class="fl">Keterangan</label><input type="text" id="f-desc" class="fi" placeholder="Deskripsi..."></div>
        <div class="row2">
          <div class="fg"><label class="fl">Kategori</label><select id="f-cat" class="fi"></select></div>
          <div class="fg"><label class="fl">PIC</label><select id="f-pic" class="fi"></select></div>
        </div>
        <div class="fg"><label class="fl">Label</label><div class="tags" id="f-labels"></div></div>
        <div class="fg"><label class="fl">Catatan</label><textarea id="f-note" class="fi" rows="2" placeholder="Opsional..." style="resize:none"></textarea></div>
        <button class="btn btn-primary" id="save-btn" onclick="saveExpense()">Simpan Pengeluaran</button>
      </div>
    </div>

    <!-- RIWAYAT -->
    <div id="pg-list" class="page">
      <div class="chips" id="chip-cat"></div>
      <div class="chips" id="chip-pic"></div>
      <div class="fg" style="margin-bottom:8px">
        <select id="chip-month" class="fi" style="padding:7px 11px;font-size:12px" onchange="applyFilter()"></select>
      </div>
      <div class="list-info" id="list-info"></div>
      <div id="exp-list"></div>
    </div>

    <!-- LOG -->
    <div id="pg-log" class="page">
      <div class="card">
        <div class="card-title">📋 History Log (100 terbaru)</div>
        <div id="log-list"><div class="empty"><div class="empty-icon">📋</div>Memuat...</div></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="pg-settings" class="page">
      <div class="card">
        <div class="slabel">Kategori</div>
        <div class="add-row">
          <input type="text" id="new-cat" class="fi" placeholder="Nama kategori" style="margin:0">
          <input type="color" id="new-cat-color" class="cpick" value="#38bdf8">
          <button class="btn btn-ghost btn-sm" onclick="addCat()">+ Tambah</button>
        </div>
        <div id="cat-list"></div>
      </div>
      <div class="card">
        <div class="slabel">Label</div>
        <div class="add-row">
          <input type="text" id="new-label" class="fi" placeholder="Nama label" style="margin:0">
          <input type="color" id="new-label-color" class="cpick" value="#34d399">
          <button class="btn btn-ghost btn-sm" onclick="addLabel()">+ Tambah</button>
        </div>
        <div id="label-list"></div>
      </div>
      <div class="card">
        <div class="slabel">PIC</div>
        <div class="add-row">
          <input type="text" id="new-pic" class="fi" placeholder="Nama PIC" style="margin:0">
          <button class="btn btn-ghost btn-sm" onclick="addPIC()">+ Tambah</button>
        </div>
        <div id="pic-list"></div>
      </div>
      <div class="card">
        <div class="slabel">Export</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="exportJSON()" style="flex:1;justify-content:center">JSON</button>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()" style="flex:1;justify-content:center">CSV</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn on" onclick="nav('dashboard',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
    </button>
    <button class="nav-btn" onclick="nav('add',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Tambah
    </button>
    <button class="nav-btn" onclick="nav('list',this)">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r=".5" fill="currentColor"/><circle cx="3.5" cy="12" r=".5" fill="currentColor"/><circle cx="3.5" cy="18" r=".5" fill="currentColor"/></svg>Riwayat
    </button>
    <button class="nav-btn" onclick="nav('log',this)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Log
    </button>
    <button class="nav-btn" onclick="nav('settings',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Pengaturan
    </button>
  </nav>
</div>

<script>
// ════════════════════════════════════════════════
//  SUPABASE CONFIG — langsung di sini, tidak perlu isi manual
// ════════════════════════════════════════════════
const SB_URL = 'https://pfxfgfzhivcisgpayvyx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmeGZnZnpoaXZjaXNncGF5dnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NzMzOTAsImV4cCI6MjA5NTI0OTM5MH0.1ZPIR5_fPSzJRxK22VKha_IsReiWqlEoXEFH1kqUzrk';

// ════════════════════════════════════════════════
//  SETTINGS — disimpan localStorage (per device, tidak perlu sync)
// ════════════════════════════════════════════════
const CFG_KEY = 'exp_cfg_v3';
let CFG = (() => {
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || defCfg(); } catch(_){ return defCfg(); }
})();
function defCfg() {
  return {
    categories: [
      {id:'c1',name:'Operasional',  color:'#38bdf8'},
      {id:'c2',name:'Marketing',    color:'#34d399'},
      {id:'c3',name:'SDM',          color:'#f87171'},
      {id:'c4',name:'Transportasi', color:'#fbbf24'},
      {id:'c5',name:'Lain-lain',    color:'#94a3b8'},
    ],
    labels: [
      {id:'l1',name:'Rutin',     color:'#38bdf8'},
      {id:'l2',name:'Prioritas', color:'#f87171'},
      {id:'l3',name:'Ad-hoc',    color:'#fbbf24'},
      {id:'l4',name:'Reimburse', color:'#34d399'},
    ],
    pics: ['Budi','Sari','Andi','Dewi'],
  };
}
function saveCfg(){ localStorage.setItem(CFG_KEY, JSON.stringify(CFG)); }

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let expenses = [];
let logs     = [];
let selLabels = [];
let fCat = '', fPIC = '', fMonth = nowMonth();

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function nowMonth(){ return new Date().toISOString().slice(0,7); }
function fmt(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }
function fmtS(n){
  if(n>=1e6) return 'Rp '+(n/1e6).toFixed(1)+'jt';
  if(n>=1e3) return 'Rp '+(n/1e3).toFixed(0)+'rb';
  return 'Rp '+n;
}
function getCat(id){ return CFG.categories.find(c=>c.id===id); }
function getLbl(id){ return CFG.labels.find(l=>l.id===id); }
function av(name,color){
  return `<div class="exp-av" style="background:${color}22;color:${color}">${(name||'?').slice(0,2).toUpperCase()}</div>`;
}
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'var(--danger)':type==='ok'?'var(--success)':'var(--text)';
  t.style.color=(type==='err'||type==='ok')?'#0f172a':'var(--bg)';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2800);
}
function loader(show,msg='Memuat...'){
  const l=document.getElementById('loader');
  document.getElementById('loader-msg').textContent=msg;
  l.classList.toggle('show',show);
}
function setStatus(s){
  const dot=document.getElementById('dot');
  const st=document.getElementById('status');
  dot.className='dot'+(s==='err'?' err':s==='warn'?' warn':'');
  const t=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  if(s==='ok') st.textContent='Live · '+t;
  else if(s==='err') st.textContent='Gagal konek';
  else st.textContent='Menghubungkan...';
}

// ════════════════════════════════════════════════
//  SUPABASE FETCH HELPERS
// ════════════════════════════════════════════════
const SBH = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer '+SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal',
};

async function sbGet(path){
  const r = await fetch(SB_URL+path,{headers:SBH});
  if(!r.ok) throw new Error('GET '+r.status+': '+await r.text());
  return r.json();
}
async function sbPost(path,body){
  const r = await fetch(SB_URL+path,{method:'POST',headers:{...SBH,'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('POST '+r.status+': '+await r.text());
}
async function sbDel(path){
  const r = await fetch(SB_URL+path,{method:'DELETE',headers:SBH});
  if(!r.ok) throw new Error('DEL '+r.status+': '+await r.text());
}

// ════════════════════════════════════════════════
//  LOAD DATA
// ════════════════════════════════════════════════
async function loadAll(){
  const btn=document.getElementById('sync-btn');
  btn.classList.add('spin');
  setStatus('warn');
  try {
    expenses = await sbGet('/rest/v1/expenses?order=date.desc,created_at.desc');
    setStatus('ok');
    renderDashboard();
    // refresh page yang sedang aktif
    const pg = document.querySelector('.page.active')?.id?.replace('pg-','');
    if(pg==='list') renderList();
    if(pg==='log')  await renderLog();
  } catch(e){
    setStatus('err');
    toast('Gagal: '+e.message,'err');
    console.error(e);
  } finally {
    btn.classList.remove('spin');
  }
}

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
function nav(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('on');
  if(id==='dashboard') renderDashboard();
  if(id==='add')       initForm();
  if(id==='list')      renderList();
  if(id==='log')       renderLog();
  if(id==='settings')  renderSettings();
}

// ════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════
function renderDashboard(){
  const m  = nowMonth();
  const pm = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();
  const tM = expenses.filter(e=>e.date.startsWith(m));
  const pM = expenses.filter(e=>e.date.startsWith(pm));
  const tot = tM.reduce((a,b)=>a+Number(b.amount),0);
  const pTot= pM.reduce((a,b)=>a+Number(b.amount),0);
  const avg = tM.length ? Math.round(tot/tM.length) : 0;
  const diff= pTot ? ((tot-pTot)/pTot*100).toFixed(0) : null;
  const dCls= diff>0?'up':'dn';
  const dTxt= diff!==null?(diff>0?'▲':'▼')+Math.abs(diff)+'% vs bln lalu':'—';

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total bulan ini</div><div class="metric-val">${fmtS(tot)}</div><div class="metric-sub ${dCls}">${dTxt}</div></div>
    <div class="metric"><div class="metric-label">Transaksi</div><div class="metric-val">${tM.length}</div><div class="metric-sub">${pM.length} bln lalu</div></div>
    <div class="metric"><div class="metric-label">Rata-rata</div><div class="metric-val">${fmtS(avg)}</div></div>
    <div class="metric"><div class="metric-label">Bln lalu</div><div class="metric-val">${fmtS(pTot)}</div></div>`;

  // Chart kategori
  const cMap={};
  tM.forEach(e=>{cMap[e.category_id]=(cMap[e.category_id]||0)+Number(e.amount);});
  const maxC=Math.max(...Object.values(cMap),1);
  document.getElementById('chart-cat').innerHTML=Object.entries(cMap).sort((a,b)=>b[1]-a[1]).map(([cid,amt])=>{
    const c=getCat(cid); if(!c) return '';
    return `<div class="bar-row"><div class="bar-name">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${c.color}"><span class="bar-val">${fmtS(amt)}</span></div></div></div>`;
  }).join('')||'<div class="empty"><div class="empty-icon">📊</div>Belum ada data</div>';

  // Chart PIC
  const pMap={};
  tM.forEach(e=>{pMap[e.pic]=(pMap[e.pic]||0)+Number(e.amount);});
  const pColors=['#38bdf8','#34d399','#f87171','#fbbf24','#a78bfa','#fb923c'];
  const maxP=Math.max(...Object.values(pMap),1);
  document.getElementById('chart-pic').innerHTML=Object.entries(pMap).sort((a,b)=>b[1]-a[1]).map(([pic,amt],i)=>{
    return `<div class="bar-row"><div class="bar-name">${pic}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxP*100)}%;background:${pColors[i%pColors.length]}"><span class="bar-val">${fmtS(amt)}</span></div></div></div>`;
  }).join('')||'<div class="empty"><div class="empty-icon">👤</div>Belum ada data</div>';

  // Recent
  document.getElementById('recent').innerHTML=expenses.slice(0,6).map(expHTML).join('')
    ||'<div class="empty"><div class="empty-icon">📭</div>Belum ada pengeluaran</div>';
}

function expHTML(e,del=false){
  const c=getCat(e.category_id)||{name:'?',color:'#64748b'};
  const lbls=(e.labels||[]).map(l=>getLbl(l)).filter(Boolean);
  return `<div class="exp">
    ${av(e.pic,c.color)}
    <div class="exp-body">
      <div class="exp-title">${e.description}</div>
      <div class="exp-meta">
        <span style="color:${c.color}">${c.name}</span><span>·</span><span>${e.pic}</span>
        ${lbls.map(l=>`<span class="badge" style="background:${l.color}22;color:${l.color}">${l.name}</span>`).join('')}
        ${e.note?`<span style="font-style:italic">·${e.note}</span>`:''}
      </div>
    </div>
    <div class="exp-right">
      <div class="exp-amt">${fmt(e.amount)}</div>
      <div class="exp-date">${e.date}</div>
      ${del?`<button class="btn-del" style="margin-top:5px" onclick="delExp('${e.id}','${(e.description||'').replace(/'/g,"\\'")}')">Hapus</button>`:''}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
//  ADD FORM
// ════════════════════════════════════════════════
function initForm(){
  document.getElementById('f-cat').innerHTML=CFG.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('f-pic').innerHTML=CFG.pics.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  selLabels=[];
  renderLabelTags();
}
function renderLabelTags(){
  document.getElementById('f-labels').innerHTML=CFG.labels.map(l=>{
    const on=selLabels.includes(l.id);
    return `<button class="tag${on?' on':''}" style="${on?`background:${l.color};border-color:${l.color}`:`border-color:${l.color};color:${l.color}`}" onclick="togLabel('${l.id}')">${l.name}</button>`;
  }).join('');
}
function togLabel(id){
  const i=selLabels.indexOf(id);
  if(i>=0) selLabels.splice(i,1); else selLabels.push(id);
  renderLabelTags();
}

async function saveExpense(){
  const date  =document.getElementById('f-date').value;
  const desc  =document.getElementById('f-desc').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  const cat   =document.getElementById('f-cat').value;
  const pic   =document.getElementById('f-pic').value;
  const note  =document.getElementById('f-note').value.trim();
  if(!date||!desc||!amount||amount<=0){toast('Lengkapi tanggal, deskripsi, jumlah','err');return;}

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Menyimpan...';

  const row={id:uid(),date,description:desc,amount,category_id:cat,pic,labels:[...selLabels],note,created_at:new Date().toISOString()};
  try {
    await sbPost('/rest/v1/expenses',row);
    await sbPost('/rest/v1/activity_logs',{id:uid(),action:'CREATE_EXPENSE',data:{description:desc,amount,category:getCat(cat)?.name,pic,date},created_at:new Date().toISOString()});
    expenses.unshift(row);
    document.getElementById('f-desc').value='';
    document.getElementById('f-amount').value='';
    document.getElementById('f-note').value='';
    selLabels=[]; renderLabelTags();
    toast('Tersimpan ✓','ok');
    renderDashboard();
  } catch(e){
    toast('Gagal simpan: '+e.message,'err');
  } finally {
    btn.disabled=false; btn.textContent='Simpan Pengeluaran';
  }
}

// ════════════════════════════════════════════════
//  LIST
// ════════════════════════════════════════════════
function renderList(){
  const cats=[{id:'',name:'Semua'},...CFG.categories];
  document.getElementById('chip-cat').innerHTML=cats.map(c=>
    `<button class="chip${fCat===c.id?' on':''}" onclick="setFC('${c.id}')">${c.name}</button>`).join('');
  const pics=['Semua',...CFG.pics];
  document.getElementById('chip-pic').innerHTML=pics.map(p=>{
    const v=p==='Semua'?'':p;
    return `<button class="chip${fPIC===v?' on':''}" onclick="setFP('${v}')">${p}</button>`;
  }).join('');
  const months=[...new Set(expenses.map(e=>e.date.slice(0,7)))].sort().reverse();
  document.getElementById('chip-month').innerHTML=`<option value="">Semua bulan</option>`+
    months.map(m=>`<option value="${m}"${fMonth===m?' selected':''}>${m}</option>`).join('');

  let data=expenses.slice();
  if(fCat)   data=data.filter(e=>e.category_id===fCat);
  if(fPIC)   data=data.filter(e=>e.pic===fPIC);
  if(fMonth) data=data.filter(e=>e.date.startsWith(fMonth));

  const tot=data.reduce((a,b)=>a+Number(b.amount),0);
  document.getElementById('list-info').textContent=data.length?`${data.length} transaksi · ${fmt(tot)}`:'';
  document.getElementById('exp-list').innerHTML=data.length
    ?data.map(e=>`<div class="card" style="padding:11px">${expHTML(e,true)}</div>`).join('')
    :'<div class="empty"><div class="empty-icon">🗂️</div>Tidak ada data</div>';
}
function setFC(v){fCat=v;renderList();}
function setFP(v){fPIC=v;renderList();}
function applyFilter(){fMonth=document.getElementById('chip-month').value;renderList();}

async function delExp(id,desc){
  if(!confirm(`Hapus "${desc}"?`)) return;
  try{
    await sbDel(`/rest/v1/expenses?id=eq.${id}`);
    await sbPost('/rest/v1/activity_logs',{id:uid(),action:'DELETE_EXPENSE',data:{id,description:desc},created_at:new Date().toISOString()});
    expenses=expenses.filter(e=>e.id!==id);
    renderList(); renderDashboard();
    toast('Dihapus');
  }catch(e){ toast('Gagal hapus: '+e.message,'err'); }
}

// ════════════════════════════════════════════════
//  LOG
// ════════════════════════════════════════════════
async function renderLog(){
  document.getElementById('log-list').innerHTML='<div class="empty"><div class="empty-icon">⏳</div>Memuat log...</div>';
  try{
    logs=await sbGet('/rest/v1/activity_logs?order=created_at.desc&limit=100');
  }catch(e){ logs=[]; }
  const info={
    CREATE_EXPENSE:{icon:'➕',label:'Tambah',color:'var(--success)'},
    DELETE_EXPENSE:{icon:'🗑️',label:'Hapus', color:'var(--danger)'},
    ADD_CAT:       {icon:'🏷️',label:'Kategori baru',color:'var(--accent)'},
    DEL_CAT:       {icon:'🏷️',label:'Hapus kategori',color:'var(--text3)'},
    ADD_LABEL:     {icon:'🔖',label:'Label baru',color:'var(--accent)'},
    DEL_LABEL:     {icon:'🔖',label:'Hapus label',color:'var(--text3)'},
    ADD_PIC:       {icon:'👤',label:'PIC baru',color:'var(--accent)'},
    DEL_PIC:       {icon:'👤',label:'Hapus PIC',color:'var(--text3)'},
  };
  if(!logs.length){
    document.getElementById('log-list').innerHTML='<div class="empty"><div class="empty-icon">📋</div>Belum ada aktivitas</div>';
    return;
  }
  document.getElementById('log-list').innerHTML=logs.map(log=>{
    const inf=info[log.action]||{icon:'📝',label:log.action,color:'var(--text2)'};
    const d=log.data||{};
    const dt=new Date(log.created_at);
    const dts=dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' · '+dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    let det='';
    if(d.description) det+=d.description;
    if(d.amount)      det+=' · '+fmt(d.amount);
    if(d.pic)         det+=' · '+d.pic;
    if(d.name)        det+=d.name;
    return `<div class="log-item">
      <div class="log-icon" style="background:${inf.color}22;color:${inf.color}">${inf.icon}</div>
      <div>
        <div class="log-action" style="color:${inf.color}">${inf.label}</div>
        <div class="log-detail">${det||'—'}</div>
        <div class="log-time">${dts}</div>
      </div>
    </div>`;
  }).join('');
}

function renderSettings(){
  document.getElementById('cat-list').innerHTML=CFG.categories.map(c=>
    `<div class="srow"><div class="sname"><span class="cdot" style="background:${c.color}"></span>${c.name}</div><button class="btn-del" onclick="delCat('${c.id}','${c.name}')">Hapus</button></div>`).join('');
  document.getElementById('label-list').innerHTML=CFG.labels.map(l=>
    `<div class="srow"><div class="sname"><span class="cdot" style="background:${l.color}"></span>${l.name}</div><button class="btn-del" onclick="delLabel('${l.id}','${l.name}')">Hapus</button></div>`).join('');
  document.getElementById('pic-list').innerHTML=CFG.pics.map(p=>
    `<div class="srow"><div class="sname">👤 ${p}</div><button class="btn-del" onclick="delPIC('${p}')">Hapus</button></div>`).join('');

async function addCat(){
  const name=document.getElementById('new-cat').value.trim();
  const color=document.getElementById('new-cat-color').value;
  if(!name) return;
  CFG.categories.push({id:uid(),name,color});
  document.getElementById('new-cat').value='';
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'ADD_CAT',data:{name},created_at:new Date().toISOString()});
  toast('Kategori ditambahkan');
}
async function delCat(id,name){
  CFG.categories=CFG.categories.filter(c=>c.id!==id);
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'DEL_CAT',data:{name},created_at:new Date().toISOString()});
  toast('Dihapus');
}
async function addLabel(){
  const name=document.getElementById('new-label').value.trim();
  const color=document.getElementById('new-label-color').value;
  if(!name) return;
  CFG.labels.push({id:uid(),name,color});
  document.getElementById('new-label').value='';
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'ADD_LABEL',data:{name},created_at:new Date().toISOString()});
  toast('Label ditambahkan');
}
async function delLabel(id,name){
  CFG.labels=CFG.labels.filter(l=>l.id!==id);
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'DEL_LABEL',data:{name},created_at:new Date().toISOString()});
  toast('Dihapus');
}
async function addPIC(){
  const name=document.getElementById('new-pic').value.trim();
  if(!name||CFG.pics.includes(name)) return;
  CFG.pics.push(name);
  document.getElementById('new-pic').value='';
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'ADD_PIC',data:{name},created_at:new Date().toISOString()});
  toast('PIC ditambahkan');
}
async function delPIC(name){
  CFG.pics=CFG.pics.filter(p=>p!==name);
  saveCfg(); renderSettings();
  await sbPost('/rest/v1/activity_logs',{id:uid(),action:'DEL_PIC',data:{name},created_at:new Date().toISOString()});
  toast('Dihapus');
}

function exportJSON(){
  const b=new Blob([JSON.stringify(expenses,null,2)],{type:'application/json'});
  dl(b,`expenses-${nowMonth()}.json`);
}
function exportCSV(){
  const rows=[['ID','Tanggal','Deskripsi','Jumlah','Kategori','PIC','Label','Catatan']];
  expenses.forEach(e=>{
    const c=getCat(e.category_id);
    const lbls=(e.labels||[]).map(l=>getLbl(l)?.name).filter(Boolean).join(';');
    rows.push([e.id,e.date,e.description,e.amount,c?.name||'',e.pic,lbls,e.note||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl(new Blob([csv],{type:'text/csv'}),`expenses-${nowMonth()}.csv`);
}
function dl(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  toast('File diunduh');
}
